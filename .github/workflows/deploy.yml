name: Deploy MantrInn

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      rollback_release:
        description: "Release folder name to rollback to (optional)"
        required: false
        type: string

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rollback on demand
        if: ${{ github.event.inputs.rollback_release != '' }}
        run: |
          set -e
          /var/www/mantri_inn/scripts/rollback.sh "${{ github.event.inputs.rollback_release }}"
          sudo systemctl reload nginx

      - name: Write frontend production env
        if: ${{ github.event.inputs.rollback_release == '' }}
        run: |
          cat > admin/.env.production << 'EOF'
          ${{ secrets.FRONTEND_ENV_FILE }}
          EOF

      - name: Build frontend
        if: ${{ github.event.inputs.rollback_release == '' }}
        run: |
          set -e
          cd admin
          npm ci
          CI=false npm run build
          cd ..
          tar -czf /tmp/frontend.tgz -C admin build

      - name: Package backend
        if: ${{ github.event.inputs.rollback_release == '' }}
        run: |
          set -e
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.env' \
            -czf /tmp/backend.tgz -C Backend .

      - name: Deploy on VPS
        if: ${{ github.event.inputs.rollback_release == '' }}
        run: |
          set -euo pipefail
          RELEASE_ID="$(date +%Y%m%d%H%M%S)"
          /var/www/mantri_inn/scripts/deploy.sh "$RELEASE_ID" /tmp/frontend.tgz /tmp/backend.tgz
          sudo systemctl reload nginx
