name: Deploy MantrInn

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      rollback_release:
        description: "Release folder name to rollback to (optional)"
        required: false
        type: string

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rollback on demand
        if: ${{ github.event.inputs.rollback_release != '' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            /var/www/mantri_inn/scripts/rollback.sh "${{ github.event.inputs.rollback_release }}"
            sudo systemctl reload nginx

      - name: Write frontend production env
        if: ${{ github.event.inputs.rollback_release == '' }}
        run: |
          cat > admin/.env.production << 'EOF'
          ${{ secrets.FRONTEND_ENV_FILE }}
          EOF

      - name: Build frontend
        if: ${{ github.event.inputs.rollback_release == '' }}
        run: |
          set -e
          cd admin
          npm ci
          npm run build
          cd ..
          tar -czf frontend.tgz -C admin build

      - name: Package backend
        if: ${{ github.event.inputs.rollback_release == '' }}
        run: |
          set -e
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.env' \
            -czf backend.tgz -C Backend .

      - name: Upload artifacts to VPS
        if: ${{ github.event.inputs.rollback_release == '' }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "frontend.tgz,backend.tgz"
          target: "/tmp"

      - name: Deploy on VPS
        if: ${{ github.event.inputs.rollback_release == '' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -euo pipefail

            RELEASE_ID="$(date +%Y%m%d%H%M%S)"
            /var/www/mantri_inn/scripts/deploy.sh "$RELEASE_ID" /tmp/frontend.tgz /tmp/backend.tgz

            sudo systemctl reload nginx
