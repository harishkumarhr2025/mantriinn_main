name: Deploy MantrInn

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      rollback_release:
        description: "Release folder name to rollback to (optional)"
        required: false
        type: string

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  # ── Build + Deploy on VPS self-hosted runner ────────────────────────────────
  deploy:
    runs-on: self-hosted
    if: ${{ github.event.inputs.rollback_release == '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend
        run: |
          set -e
          cp /var/www/mantri_inn/shared/.env.frontend admin/.env.production
          cd admin
          npm ci
          CI=false npm run build

      - name: Package artifacts
        run: |
          tar -czf /tmp/frontend.tgz -C admin build
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.env' \
            -czf /tmp/backend.tgz -C Backend .

      - name: Deploy
        run: |
          set -euo pipefail
          RELEASE_ID="$(date +%Y%m%d%H%M%S)"
          /var/www/mantri_inn/scripts/deploy.sh \
            "$RELEASE_ID" \
            /tmp/frontend.tgz \
            /tmp/backend.tgz
          sudo systemctl reload nginx

  # ── Rollback job (manual trigger only) ─────────────────────────────────────
  rollback:
    runs-on: self-hosted
    if: ${{ github.event.inputs.rollback_release != '' }}

    steps:
      - name: Rollback
        run: |
          set -e
          /var/www/mantri_inn/scripts/rollback.sh "${{ github.event.inputs.rollback_release }}"
          sudo systemctl reload nginx
