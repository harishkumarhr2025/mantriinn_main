name: Deploy MantrInn

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      rollback_release:
        description: "Release folder name to rollback to (optional)"
        required: false
        type: string

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    if: ${{ github.event.inputs.rollback_release == '' }}

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4

      - name: Build frontend
        run: |
          cp /var/www/mantri_inn/shared/.env.frontend admin/.env.production
          cd admin
          npm ci
          CI=false npm run build

      - name: Deploy frontend
        run: |
          rm -rf /var/www/mantri_inn/frontend/current/build
          cp -r admin/build /var/www/mantri_inn/frontend/current/build
          sudo systemctl reload nginx

      - name: Deploy backend
        run: |
          cp -r Backend/. /var/www/mantri_inn/backend/current/
          cd /var/www/mantri_inn/backend/current
          npm ci --omit=dev
          pm2 reload mantriinn-backend

  rollback:
    runs-on: self-hosted
    if: ${{ github.event.inputs.rollback_release != '' }}

    steps:
      - name: Rollback
        run: |
          /var/www/mantri_inn/scripts/rollback.sh "${{ github.event.inputs.rollback_release }}"
          sudo systemctl reload nginx
